services:
  postgres:
    image: postgres:16-alpine
    container_name: eter-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: eter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d eter']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
